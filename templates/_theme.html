{# ══════════════════════════════════════════════════════════════════════════
   Shared theme partial — include near top of <body> on every page.
   Provides:
     • Theme bootstrap (applies data-theme before paint to avoid FOUC)
     • <style> block with VS 2017 C++ Light overrides for all pages
     • Theme toggle button auto-injected into the nav bar
   ══════════════════════════════════════════════════════════════════════════ #}

<script>
// Apply theme BEFORE any content paints.
(function() {
    try {
        var th = (localStorage.getItem('game_theme') === 'light' ? 'light' : 'terminal');
        if (th === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch(_) {}
})();
</script>

<script>
// Theme controller + toggle button injection.
const THEME = {
    current: (localStorage.getItem('game_theme') === 'light' ? 'light' : 'terminal'),
    set(name) {
        if (name !== 'terminal' && name !== 'light') return;
        this.current = name;
        localStorage.setItem('game_theme', name);
        if (name === 'light') document.documentElement.setAttribute('data-theme', 'light');
        else                  document.documentElement.removeAttribute('data-theme');
        const btn = document.getElementById('nav-theme');
        if (btn) btn.textContent = name === 'light' ? '[ ◐ DARK ]' : '[ ☀ LIGHT ]';
    },
};
function toggleTheme() { THEME.set(THEME.current === 'light' ? 'terminal' : 'light'); }

document.addEventListener('DOMContentLoaded', function() {
    // Skip if page already provides a #nav-theme button (index.html does so inline).
    if (document.getElementById('nav-theme')) {
        document.getElementById('nav-theme').textContent =
            THEME.current === 'light' ? '[ ◐ DARK ]' : '[ ☀ LIGHT ]';
        return;
    }
    // Try the common nav containers used across the app.
    const host =
        document.getElementById('nav-right') ||
        document.getElementById('nav-info') ||
        document.querySelector('#nav-bar');
    if (!host) return;
    const a = document.createElement('a');
    a.id = 'nav-theme';
    a.href = '#';
    a.textContent = THEME.current === 'light' ? '[ ◐ DARK ]' : '[ ☀ LIGHT ]';
    a.addEventListener('click', function(e) { e.preventDefault(); toggleTheme(); });
    // Insert before the "back to desktop" link if present, else append.
    const backLink = host.querySelector('#nav-back, #nav-logout');
    if (backLink) host.insertBefore(a, backLink);
    else host.appendChild(a);
});
</script>
